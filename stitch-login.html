<!DOCTYPE html><html lang="vi"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;family=Inter:wght@100..900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-error-container": "#752121",
                    "primary-fixed": "#d0e8db",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary": "#fff8ef",
                    "surface-container": "#edeee8",
                    "secondary-fixed-dim": "#e0d3bb",
                    "on-error": "#fff7f6",
                    "surface-container-high": "#e6e9e2",
                    "on-background": "#2f342e",
                    "inverse-primary": "#dbf4e6",
                    "inverse-surface": "#0d0f0d",
                    "surface-dim": "#d6dcd2",
                    "secondary-fixed": "#eee1c9",
                    "outline-variant": "#afb3ac",
                    "on-surface": "#2f342e",
                    "primary-dim": "#42574d",
                    "on-tertiary": "#f9f9f4",
                    "on-primary": "#e5fdf0",
                    "surface-variant": "#e0e4dc",
                    "tertiary-fixed": "#f4f4ef",
                    "background": "#faf9f5",
                    "on-primary-fixed": "#2f443a",
                    "surface-container-highest": "#e0e4dc",
                    "surface": "#faf9f5",
                    "surface-bright": "#faf9f5",
                    "secondary-dim": "#5b5240",
                    "on-tertiary-fixed-variant": "#656763",
                    "tertiary-container": "#f4f4ef",
                    "surface-tint": "#4d6359",
                    "tertiary-fixed-dim": "#e5e6e1",
                    "secondary": "#675e4b",
                    "on-primary-fixed-variant": "#4b6056",
                    "on-secondary-fixed-variant": "#635b48",
                    "tertiary": "#5e605c",
                    "primary-container": "#d0e8db",
                    "on-tertiary-fixed": "#484a47",
                    "secondary-container": "#eee1c9",
                    "on-tertiary-container": "#5b5c59",
                    "primary": "#4d6359",
                    "on-secondary-container": "#59513e",
                    "error": "#9f403d",
                    "on-primary-container": "#41564c",
                    "tertiary-dim": "#525450",
                    "error-dim": "#4e0309",
                    "surface-container-low": "#f4f4ef",
                    "on-surface-variant": "#5c605a",
                    "primary-fixed-dim": "#c2dacd",
                    "on-secondary-fixed": "#463f2d",
                    "error-container": "#fe8983",
                    "outline": "#787c75",
                    "inverse-on-surface": "#9d9d9a"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Newsreader", "serif"],
                    "body": ["Inter", "sans-serif"],
                    "label": ["Inter", "sans-serif"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Newsreader', serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
        }
    </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center overflow-hidden">
<!-- Environment Background -->
<div class="fixed inset-0 z-0">
<img alt="Serene dawn" class="w-full h-full object-cover" data-alt="expansive view of a serene dawn sky with soft gradients of peach, lavender, and pale blue, misty morning light over distant mountains" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAgvsHOwaA6M02038SSeOlZKKi3Q5pnB5Xyi9ER418uly7djrzAHxxz9A0V53_FTAfdhv7mrWKZXuFoUE0e68y6oYKPJefyncdgtPGtQOJ_9B-jf4gqwpRO_51x8uelov0veT4YG5jjNW2C4sNpI4eFKZw-nB0qKzGLcjshI7uCggwXCkKE9gHE5kWqHuxrL1es2YtVFNyEQxqwpbXCF8xvHgffPu0PM-vyGkrxEYHtwf07_SJzf1U5q5u3RzgLqn1lrlMPJBKrVHA" style="">
<div class="absolute inset-0 bg-white/10"></div>
</div>
<!-- Main Content Shell -->
<main class="z-10 w-full max-w-lg px-6 min-h-screen flex flex-col justify-center items-center relative">
<!-- Identity Branding (as per JSON/Design System) -->
<div class="text-center mb-8">
<h1 class="font-serif italic tracking-tight text-8xl text-[#2F342E]" style="">Serene</h1>
<p class="font-label text-xs uppercase tracking-[0.3em] text-on-surface/60 mt-4" style="">Digital Sanctuary</p>
</div>
<!-- Glassmorphism Login Card -->
<section class="glass-card rounded-xl p-10 md:p-14 shadow-[0_40px_60px_rgba(47,52,46,0.08)]">
<header class="mb-10">
<h2 class="font-serif text-2xl text-on-surface mb-2" style="">Chào mừng bạn trở lại</h2>
<p class="text-on-surface-variant/80 text-sm" style="">Tìm lại sự bình yên trong tâm hồn.</p>
</header>
<form class="space-y-8">
<!-- Email Field -->
<div class="group">
<label class="block font-label text-[10px] uppercase tracking-widest text-on-surface-variant mb-2 ml-1" for="email" style="">Email</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/30 py-3 px-1 text-on-surface focus:ring-0 focus:border-primary transition-all placeholder:text-on-surface-variant/30" id="email" name="email" placeholder="your@email.com" type="email">
</div>
<!-- Password Field -->
<div class="group">
<div class="flex justify-between items-end mb-2">
<label class="block font-label text-[10px] uppercase tracking-widest text-on-surface-variant ml-1" for="password" style="">Mật khẩu</label>
<a class="font-label text-[10px] uppercase tracking-widest text-primary/60 hover:text-primary transition-colors" href="#" style="">Quên?</a>
</div>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/30 py-3 px-1 text-on-surface focus:ring-0 focus:border-primary transition-all placeholder:text-on-surface-variant/30" id="password" name="password" placeholder="••••••••" type="password">
</div>
<!-- Primary Action -->
<div class="pt-6">
<button class="w-full bg-gradient-to-b from-primary to-primary-dim text-on-primary font-body font-medium py-4 rounded-full shadow-lg hover:shadow-xl hover:scale-[1.02] active:scale-[0.98] transition-all duration-300" style="" type="submit">
                        Bước vào
                    </button>
</div>
</form>
<footer class="mt-12 text-center">
<p class="text-on-surface-variant/60 text-xs tracking-tight" style="">
                    Bạn chưa có tài khoản? 
                    <a class="text-primary font-semibold ml-1 hover:underline underline-offset-4 decoration-2" href="#" style="">Tham gia ngay</a>
</p>
</footer>
</section>
<!-- Aesthetic Vertical Spacing as per Design System -->
<!-- Secondary Transactional Footer -->
<footer class="flex justify-center items-center gap-6 mt-8">
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface/40" style="">©GROUP 039 VINAI<br></span>
<div class="w-1 h-1 bg-outline-variant/20 rounded-full"></div>
<a class="font-label text-[10px] uppercase tracking-widest text-on-surface/40 hover:text-primary transition-colors" href="#" style="">Trợ giúp</a>
<div class="w-1 h-1 bg-outline-variant/20 rounded-full"></div>
<a class="font-label text-[10px] uppercase tracking-widest text-on-surface/40 hover:text-primary transition-colors" href="#" style="">Quyền riêng tư</a>
</footer>
</main>
<!-- Subtle Grain Overlay for texture -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] z-50 bg-[url('https://grainy-gradients.vercel.app/noise.svg')]"></div>
</body></html>
