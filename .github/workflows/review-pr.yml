name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: [self-hosted, Linux, X64, phoenix-runner]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend test dependencies
        run: |
          pip install -r backend/requirements.txt pytest

      - name: Run backend tests
        env:
          PYTHONPATH: backend
        run: pytest backend/tests -q

  review:
    name: Code Review
    needs: backend-tests
    runs-on: [self-hosted, Linux, X64, phoenix-runner]
    # Same-repo PRs get secrets + token write; fork PRs skip LLM/comment (GitHub does not pass secrets / limits token).
    env:
      IS_FORK_PR: ${{ github.event.pull_request.head.repo.full_name != github.repository }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai python-dotenv

      - name: Run AI code review
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets['OPENAI_API_KEY'] }}
          OPENAI_REVIEW_MODEL: gpt-4o-mini
          MAX_DIFF_CHARS: "100000"
          CI: "true"
        run: |
          BASE="${{ github.base_ref }}"
          git fetch origin "$BASE"

          mkdir -p .ai-log
          if [ "${IS_FORK_PR}" = "true" ]; then
            echo "::notice::Fork PR: secrets are not available; skipping OpenAI review."
            {
              echo "**Skipped (fork PR)**"
              echo ""
              echo "GitHub does not pass repository \`secrets\` to workflows triggered from a fork. To get an automated LLM review, open the PR from a branch on this repository or run review locally with \`python scripts/review_pr.py\`."
            } > .ai-log/last-review.md
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
            echo "skip_comment=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "::error::OPENAI_API_KEY is empty. Add it under Settings → Secrets and variables → Actions for this repository."
            {
              echo "**Configuration error**"
              echo ""
              echo "\`OPENAI_API_KEY\` is not set in Actions secrets for this repo."
            } > .ai-log/last-review.md
            echo "exit_code=1" >> "$GITHUB_OUTPUT"
            echo "skip_comment=0" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          set +e
          set -o pipefail
          python scripts/review_pr.py "origin/$BASE" 2>&1 | tee review_output.txt
          ec=$?
          set -e
          echo "exit_code=${ec}" >> "$GITHUB_OUTPUT"
          echo "skip_comment=0" >> "$GITHUB_OUTPUT"
          exit "${ec}"

      - name: Prepare PR comment body
        if: always()
        env:
          EXIT_CODE: ${{ steps.review.outputs.exit_code }}
        run: |
          python3 << 'PY'
          import os
          from pathlib import Path

          exit_code = os.environ.get("EXIT_CODE", "0") or "0"
          log_path = Path(".ai-log/last-review.md")
          if log_path.is_file():
              review = log_path.read_text(encoding="utf-8", errors="replace")
          else:
              review = "Review could not be generated. Check the workflow logs for errors."

          if exit_code != "0":
              review = f"**Warning: review script exited with code {exit_code}.**\n\n{review}"

          Path("review_body.txt").write_text(review, encoding="utf-8")
          PY

      - name: Post review comment on PR
        if: always() && steps.review.outputs.skip_comment != '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let review = fs.readFileSync('review_body.txt', 'utf8');
            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const header = [
              '## AI Code Review',
              '',
              `> Reviewing commit \`${sha}\` against \`${{ github.base_ref }}\``,
              '',
            ].join('\n');
            const footer = [
              '',
              '---',
              '*Powered by OpenAI (`OPENAI_REVIEW_MODEL=gpt-4o-mini`) via [AI Code Review](.github/workflows/review-pr.yml); independent from Codex agent runtime model.*',
            ].join('\n');
            const maxTotal = 62000;
            let body = header + review + footer;
            if (body.length > maxTotal) {
              const budget = maxTotal - header.length - footer.length - 200;
              review = review.slice(0, Math.max(0, budget)) + '\n\n… _(comment truncated for GitHub length limit)_ …';
              body = header + review + footer;
            }
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
