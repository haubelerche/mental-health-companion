# Cloud Build pipeline — builds and deploys both backend and frontend to Cloud Run
# Project: ai20k030  |  Region: asia-southeast1 (Singapore)
#
# Required Secret Manager secrets (create once with setup_cloudrun.sh):
#   serene-database-url, serene-openai-api-key, serene-jwt-private-key,
#   serene-jwt-public-key, serene-csrf-origins,
#   serene-admin-email, serene-admin-password-hash, serene-admin-totp-secret,
#   serene-blaze-api, serene-exa-api-key

substitutions:
  _REGION: asia-southeast1
  _BACKEND_SERVICE: serene-backend
  _FRONTEND_SERVICE: serene-frontend
  _REPO: asia-southeast1-docker.pkg.dev/$PROJECT_ID/serene

steps:
  # ── 1. Build backend Docker image ──────────────────────────────────────────
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - $_REPO/backend:$COMMIT_SHA
      - -t
      - $_REPO/backend:latest
      - ./backend

  # ── 2. Push backend image ───────────────────────────────────────────────────
  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - $_REPO/backend
    waitFor: [build-backend]

  # ── 3. Deploy backend to Cloud Run ─────────────────────────────────────────
  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_BACKEND_SERVICE
      - --image=$_REPO/backend:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=0
      - --max-instances=10
      - --memory=1Gi
      - --cpu=1
      - --timeout=120s
      - --set-secrets=DATABASE_URL=serene-database-url:latest,OPENAI_API_KEY=serene-openai-api-key:latest,JWT_PRIVATE_KEY=serene-jwt-private-key:latest,JWT_PUBLIC_KEY=serene-jwt-public-key:latest,CSRF_TRUSTED_ORIGINS=serene-csrf-origins:latest,ADMIN_LOGIN_EMAIL=serene-admin-email:latest,ADMIN_PASSWORD_HASH=serene-admin-password-hash:latest,ADMIN_TOTP_SECRET=serene-admin-totp-secret:latest,BLAZE_API=serene-blaze-api:latest,EXA_API_KEY=serene-exa-api-key:latest
      - --set-env-vars=APP_NAME=Serene API,APP_VERSION=1.0.0,API_PREFIX=/v1,AUTO_CREATE_SCHEMA=false,COOKIE_SECURE=true,JWT_ALGORITHM=RS256,LOG_LEVEL=INFO,DEFAULT_MODEL=gpt-4o-mini
    waitFor: [push-backend]

  # ── 4. Get backend URL ──────────────────────────────────────────────────────
  - id: get-backend-url
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        URL=$(gcloud run services describe $_BACKEND_SERVICE \
          --region=$_REGION \
          --format='value(status.url)')
        echo "Backend URL: $$URL"
        echo -n "$$URL" > /workspace/backend_url.txt
    waitFor: [deploy-backend]

  # ── 5. Build frontend Docker image ─────────────────────────────────────────
  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - $_REPO/frontend:$COMMIT_SHA
      - -t
      - $_REPO/frontend:latest
      - ./frontend
    # Build frontend in parallel with backend deploy (no dependency on backend URL yet)
    waitFor: [build-backend]

  # ── 6. Push frontend image ──────────────────────────────────────────────────
  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - $_REPO/frontend
    waitFor: [build-frontend]

  # ── 7. Deploy frontend to Cloud Run ────────────────────────────────────────
  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        BACKEND_URL=$(cat /workspace/backend_url.txt)
        echo "Deploying frontend with BACKEND_URL=$$BACKEND_URL"
        gcloud run deploy $_FRONTEND_SERVICE \
          --image=$_REPO/frontend:$COMMIT_SHA \
          --region=$_REGION \
          --platform=managed \
          --allow-unauthenticated \
          --min-instances=0 \
          --max-instances=5 \
          --memory=256Mi \
          --cpu=1 \
          --timeout=60s \
          --set-env-vars="BACKEND_URL=$$BACKEND_URL"
    waitFor: [push-frontend, get-backend-url]

  # ── 8. Print frontend URL ───────────────────────────────────────────────────
  - id: print-urls
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        FRONTEND_URL=$(gcloud run services describe $_FRONTEND_SERVICE \
          --region=$_REGION \
          --format='value(status.url)')
        BACKEND_URL=$(cat /workspace/backend_url.txt)
        echo "============================================"
        echo " Deployment complete!"
        echo " Frontend : $$FRONTEND_URL"
        echo " Backend  : $$BACKEND_URL"
        echo "============================================"
    waitFor: [deploy-frontend]

images:
  - $_REPO/backend:$COMMIT_SHA
  - $_REPO/backend:latest
  - $_REPO/frontend:$COMMIT_SHA
  - $_REPO/frontend:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
